name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Host library: test + clippy + fmt ────────────────────────────────────
  host-test:
    name: Test (host)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@1.87.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "host"

      # Default features (sw-backend)
      - name: Test (default features)
        run: cargo test --workspace

      # Mock feature (qualification tests)
      - name: Test (mock)
        run: cargo test --workspace --features mock

      # Certs feature
      - name: Test (certs)
        run: cargo test --workspace --features certs

  host-test-linux-pqc:
    name: Test (host, Linux PQC)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@1.87.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "host"
      - name: Test (pqc)
        run: cargo test -p scorehsm-host --features pqc

  host-clippy:
    name: Clippy (host)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "host"
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --features "mock,certs" -- -D warnings

  host-ffi:
    name: FFI (host)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev build-essential
      - uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "host"
      - name: Build staticlib
        run: cargo build -p scorehsm-host --features ffi
      - name: FFI smoke test
        run: cargo test -p scorehsm-host --features ffi --test ffi_smoke
      - name: FFI clippy
        run: cargo clippy -p scorehsm-host --features ffi -- -D warnings
      - name: Header compile (gcc)
        run: gcc -std=c99 -Wall -Werror -c host/tests/c/ffi_link_test.c -Iinclude -o /tmp/ffi_link_test.o
      - name: Header compile (clang)
        run: clang -std=c17 -Wall -Werror -c host/tests/c/ffi_link_test.c -Iinclude -o /tmp/ffi_link_test-clang.o
      - name: C link test
        run: make -C host/tests/c
      - name: Upload FFI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: host-ffi-artifacts
          path: |
            target/debug/libscorehsm_host.a
            include/score/crypto/hsm.h
            include/score/crypto/hsm_types.h

  host-fmt:
    name: Format (host)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Dependency policy (replaces cargo-audit) ────────────────────────────
  deny:
    name: Deny (licenses + advisories + bans)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v1

  # ── License / SPDX compliance ──────────────────────────────────────────
  reuse:
    name: REUSE compliance
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: REUSE lint
        uses: fsfe/reuse-action@v4

  # ── Security scanning ──────────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: actions
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ── Coverage ─────────────────────────────────────────────────────────────
  host-coverage:
    name: Coverage (host)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: llvm-tools-preview
      - uses: dtolnay/rust-toolchain@nightly-2026-03-14
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "host"
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate line and function coverage
        run: cargo +1.87.0 llvm-cov -p scorehsm-host --features "mock,certs" --lcov --output-path lcov.info --fail-under-lines 85 --fail-under-functions 80
      - name: Export coverage summary
        run: cargo +1.87.0 llvm-cov report --json --summary-only --output-path coverage-summary.json
      - name: Generate branch coverage summary
        run: cargo +nightly-2026-03-14 llvm-cov -p scorehsm-host --features "mock,certs" --branch --json --summary-only --output-path branch-coverage-summary.json
      - name: Enforce branch coverage
        run: |
          python3 - <<'PY'
          import json
          import sys

          with open("branch-coverage-summary.json", "r", encoding="utf-8") as fh:
              data = json.load(fh)

          percent = data["data"][0]["totals"]["branches"]["percent"]
          print(f"Branch coverage: {percent:.2f}%")
          sys.exit(0 if percent >= 80.0 else 1)
          PY
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: host-coverage-artifacts
          path: |
            lcov.info
            coverage-summary.json
            branch-coverage-summary.json
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Firmware: cargo check (cross-compile, no flash) ─────────────────────
  # Non-blocking: Embassy API changes require firmware updates validated with
  # real hardware during Phase 10 (HIL bringup). Host library CI is the gate.
  firmware-check:
    name: Check (firmware)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly-2026-03-14
        with:
          targets: thumbv8m.main-none-eabihf
          components: clippy
      - name: Rust version
        run: rustc --version
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "firmware"
      - name: Cargo check (non-TZ)
        working-directory: firmware
        run: cargo check --release
      - name: Cargo check (TrustZone)
        working-directory: firmware
        run: cargo check --release --features trustzone
